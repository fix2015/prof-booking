services:
  postgres:
    image: postgres:16-alpine
    container_name: nail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nail_password}
      POSTGRES_DB: ${POSTGRES_DB:-nail_salon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nail_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nail_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_backend
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_celery_worker
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.modules.notifications.tasks worker --loglevel=info --concurrency=2

  celery_beat:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_celery_beat
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery_worker
    command: celery -A app.modules.notifications.tasks beat --loglevel=info

  frontend:
    image: ghcr.io/fix2015/prof-booking/frontend:latest
    container_name: nail_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: nail_salon_network
