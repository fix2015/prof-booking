services:
  postgres:
    image: postgres:16-alpine
    container_name: nail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nail_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nail_password}
      POSTGRES_DB: ${POSTGRES_DB:-nail_salon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # SECURITY: No port exposure — only accessible within Docker network
    # No "ports:" means postgres is NOT reachable from outside
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nail_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nail_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}
    volumes:
      - redis_data:/data
    # SECURITY: No port exposure — only accessible within Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_backend
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}@redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"  # nginx on host proxies /api/ to this
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python scripts/seed_work_slots.py 12 &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_celery_worker
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.modules.notifications.tasks worker --loglevel=info --concurrency=2

  celery_beat:
    image: ghcr.io/fix2015/prof-booking/backend:latest
    container_name: nail_celery_beat
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}@redis:6379/0
    depends_on:
      - celery_worker
    command: celery -A app.modules.notifications.tasks beat --loglevel=info

  frontend:
    image: ghcr.io/fix2015/prof-booking/frontend:latest
    container_name: nail_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"   # nginx on host proxies to this
    depends_on:
      - backend

  # ── Monitoring Stack ───────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nail_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    # Internal only — Grafana connects via Docker network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: nail_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-nail_user}:${POSTGRES_PASSWORD:-nail_password}@postgres:5432/${POSTGRES_DB:-nail_salon_db}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: nail_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-r3d1s_pr0b00k_s3cur3}
    depends_on:
      redis:
        condition: service_healthy

  node_exporter:
    image: prom/node-exporter:v1.7.0
    container_name: nail_node_exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    pid: host

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: nail_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  loki:
    image: grafana/loki:2.9.6
    container_name: nail_loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.6
    container_name: nail_promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.1
    container_name: nail_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-pr0b00k_graf4na}
      GF_SERVER_ROOT_URL: https://probooking.app/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"  # nginx proxies /grafana/ to this
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: nail_salon_network
