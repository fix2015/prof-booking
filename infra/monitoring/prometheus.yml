global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Server metrics (CPU, RAM, disk, network)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # Docker container metrics (per-container CPU, RAM, network)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # PostgreSQL metrics (connections, queries, cache hit ratio, table sizes)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Redis metrics (memory, connections, commands, keyspace)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
