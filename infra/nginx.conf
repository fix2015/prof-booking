# /etc/nginx/sites-available/probooking.app
# Managed by: /var/www/prof-booking/infra/nginx.conf

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name probooking.app www.probooking.app;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://probooking.app$request_uri;
    }
}

# Redirect www → apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.probooking.app;

    ssl_certificate     /etc/letsencrypt/live/probooking.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/probooking.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://probooking.app$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name probooking.app;

    ssl_certificate     /etc/letsencrypt/live/probooking.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/probooking.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Allow larger uploads (images, avatars)
    client_max_body_size 10m;

    # API → backend container
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Everything else → frontend container
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
