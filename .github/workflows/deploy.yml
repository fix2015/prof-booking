name: Deploy to AWS EC2

on:
  # Only deploy after CI has successfully built and pushed the Docker images
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

# Only one deploy at a time — cancel any in-progress run when a new one starts
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # For workflow_run trigger: only deploy if CI passed
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Decode base64 secrets → write .env files locally ─────────
      # Note: frontend env vars are baked into the image at CI build time via build-args
      - name: Decode .env files
        run: |
          echo "${{ secrets.BACKEND_ENV }}" | base64 -d > backend/.env
          echo "${{ secrets.INFRA_ENV }}"   | base64 -d > infra/.env

      # ── 3. Write SSH private key ─────────────────────────────────────
      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      # ── 4. Prepare app directory on EC2 (clone or pull) ─────────────
      - name: Pull latest code on EC2
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            APP_DIR="/opt/prof-booking"
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo git clone https://github.com/fix2015/prof-booking.git "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin main && git reset --hard origin/main
            fi
          EOF

      # ── 5. Copy decoded .env files to correct paths on EC2 ──────────
      - name: Copy .env files to EC2
        run: |
          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            backend/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/prof-booking/infra/backend.env

          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            infra/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/prof-booking/infra/.env

      # ── 6. Install Docker & Docker Compose on EC2 (if missing) ──────
      - name: Ensure Docker is installed on EC2
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
                | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
            fi
            docker --version
            docker compose version
          EOF

      # ── 7. Pull images from GHCR & start containers ─────────────────
      # Uses pre-built images from CI — faster, no disk-intensive build on EC2
      - name: Deploy with Docker Compose
        timeout-minutes: 15
        run: |
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            cd /opt/prof-booking/infra

            # Login to GHCR with the workflow token (expanded by runner before SSH)
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u fix2015 --password-stdin

            # Stop old containers
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # Pull latest pre-built images first
            sudo docker compose -f docker-compose.prod.yml pull

            # Remove only dangling (untagged) image layers to free disk space
            # -f without -a keeps tagged images (postgres, redis) intact
            sudo docker image prune -f || true

            # Start all services
            sudo docker compose -f docker-compose.prod.yml up -d

            # Show running containers
            sudo docker compose -f docker-compose.prod.yml ps
          EOF

      # ── 8. Verify services are healthy ───────────────────────────────
      - name: Health check
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /opt/prof-booking/infra
            echo "=== Container status ==="
            sudo docker compose -f docker-compose.prod.yml ps
            echo "=== Waiting for backend API ==="
            for i in $(seq 1 24); do
              STATE=$(sudo docker inspect --format='{{.State.Status}}' nail_backend 2>/dev/null || echo "unknown")
              echo "[$i/24] backend container: $STATE"
              if [ "$STATE" = "running" ]; then
                # Also verify API responds
                if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                  echo "Backend API is up."
                  break
                fi
              fi
              if [ "$i" = "24" ]; then
                echo "ERROR: backend did not become ready in time"
                sudo docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              sleep 5
            done
          EOF

      # ── 9. Cleanup local key ─────────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key.pem
