name: Scrape UK Businesses & Deploy to Prod

# Runs every Sunday at 3am UTC — scrapes all UK nail/beauty businesses,
# cleans old test data from prod, imports real businesses.
# Cost: $0.00 (uses free OpenStreetMap Nominatim API)
on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday 3am UTC
  workflow_dispatch:       # Manual trigger from GitHub UI
    inputs:
      skip_scrape:
        description: 'Skip scraping and use existing JSON from repo'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper deps
        if: inputs.skip_scrape != 'true'
        run: pip install requests beautifulsoup4

      - name: Scrape UK businesses (FREE — Nominatim)
        if: inputs.skip_scrape != 'true'
        run: |
          cd backend
          python scripts/scraper/scrape_uk_businesses.py --no-images
          echo "TOTAL=$(python3 -c "import json; print(json.load(open('scripts/scraper/output/scraped_businesses.json'))['total_count'])")" >> $GITHUB_ENV

      - name: Use existing scraped data from repo
        if: inputs.skip_scrape == 'true'
        run: |
          echo "TOTAL=$(python3 -c "import json; print(json.load(open('backend/scripts/scraper/output/scraped_businesses.json'))['total_count'])")" >> $GITHUB_ENV
          echo "Using pre-scraped data: ${{ env.TOTAL }} businesses"

      - name: Upload scraped data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraped-businesses
          path: backend/scripts/scraper/output/scraped_businesses.json
          retention-days: 30

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      - name: Copy scraped data to prod
        run: |
          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            backend/scripts/scraper/output/scraped_businesses.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/scraped_businesses.json

      - name: Clean old data & import to prod DB
        run: |
          ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
          set -e

          # Copy into backend container
          sudo docker cp /tmp/scraped_businesses.json nail_backend:/tmp/scraped_businesses.json

          # Use raw psycopg2 — no ORM overhead, minimal memory
          sudo docker exec nail_backend python -c "
          import json, os, psycopg2, psycopg2.extras

          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          conn.autocommit = False
          cur = conn.cursor()

          # 1. Clean old imports
          cur.execute(\"SELECT id FROM providers WHERE email LIKE '%%probook-demo%%' OR settings::text LIKE '%%scraped-uk-import%%'\")
          ids = [r[0] for r in cur.fetchall()]
          if ids:
              id_list = ','.join(str(i) for i in ids)
              cur.execute(f'DELETE FROM work_slots WHERE provider_id IN ({id_list})')
              cur.execute(f'DELETE FROM professional_providers WHERE provider_id IN ({id_list})')
              cur.execute(f'DELETE FROM service_providers WHERE provider_id IN ({id_list})')
              cur.execute(f'DELETE FROM services s WHERE NOT EXISTS (SELECT 1 FROM service_providers sp WHERE sp.service_id = s.id)')
              cur.execute(f'DELETE FROM sessions WHERE provider_id IN ({id_list})')
              cur.execute(f'DELETE FROM providers WHERE id IN ({id_list})')
              conn.commit()
              print(f'Cleaned {len(ids)} old providers')

          # 2. Import
          with open('/tmp/scraped_businesses.json') as f:
              businesses = json.load(f).get('businesses', [])

          SVCS = [('Gel Manicure',45,35),('Acrylic Full Set',90,55),('Gel Pedicure',50,40),('Nail Art Design',60,45),('Dip Powder Manicure',45,38),('French Manicure',40,30),('Shellac Manicure',35,28),('Nail Extensions',75,50),('Classic Manicure',30,22),('Classic Pedicure',40,28),('Nail Removal',20,15),('Nail Repair',20,12),('Infill Acrylic',60,40),('Chrome Powder Nails',50,42),('Ombre Nails',60,48),('Builder Gel Overlay',50,38),('Cuticle Care Treatment',25,18),('3D Nail Art',75,55),('Luxury Manicure & Spa',60,50),('Polygel Application',70,52),('Hard Gel Nails',65,45),('Russian Manicure',50,35),('Nail Stamping Art',45,32),('Encapsulated Nail Art',70,58),('Paraffin Wax Treatment',30,25)]
          created = 0
          for b in businesses:
              if not b.get('name'): continue
              slug = b['name'].lower().replace(' ','').replace('&','')[:20]
              logo = b.get('logo_url') or f'https://picsum.photos/seed/{slug}/200/200'
              settings = json.dumps({'osm_id':b.get('osm_id',''),'import_source':'scraped-uk-import','source':'openstreetmap','website':b.get('website',''),'opening_hours':b.get('opening_hours',[])})
              cur.execute(
                  'INSERT INTO providers (name,address,phone,email,description,logo_url,category,latitude,longitude,is_active,worker_payment_amount,deposit_percentage,settings,created_at,updated_at) VALUES (%s,%s,%s,%s,%s,%s,%s,%s,%s,true,0,10,%s,NOW(),NOW()) RETURNING id',
                  (b['name'],b.get('address'),b.get('phone'),b.get('email'),b.get('description',''),logo,b.get('category','Beauty & Nails'),b.get('latitude'),b.get('longitude'),settings)
              )
              pid = cur.fetchone()[0]
              for sn,dur,price in SVCS:
                  cur.execute('INSERT INTO services (name,duration_minutes,price,is_active,created_at,updated_at) VALUES (%s,%s,%s,true,NOW(),NOW()) RETURNING id',(sn,dur,price))
                  sid = cur.fetchone()[0]
                  cur.execute('INSERT INTO service_providers (service_id,provider_id) VALUES (%s,%s)',(sid,pid))
              created += 1
              if created % 50 == 0:
                  conn.commit()
                  print(f'  {created} providers imported...')
          conn.commit()
          print(f'Imported {created} providers with {created*len(SVCS)} services')
          cur.close()
          conn.close()
          "

          # Cleanup
          rm -f /tmp/scraped_businesses.json
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key.pem

      - name: Summary
        run: |
          echo "### Scraper Results" >> $GITHUB_STEP_SUMMARY
          echo "- Businesses scraped: ${{ env.TOTAL }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cost: \$0.00" >> $GITHUB_STEP_SUMMARY
          echo "- Source: OpenStreetMap Nominatim (free)" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed to: https://probooking.app" >> $GITHUB_STEP_SUMMARY
